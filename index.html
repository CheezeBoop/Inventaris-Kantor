<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <title>Inventaris Barang Kantor</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body        { background-color: #f5f0e8; font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; }
    .navbar     { background-color: #ffffff; border-bottom: 1px solid #e0d8c8; }
    .card       { background-color: #ffffff; border: 1px solid #e8e0d0; border-radius: 12px; }
    .btn-simpan { background-color: #6b5c45; color: #fff; border: none; }
    .btn-simpan:hover { background-color: #4e3f2e; color: #fff; }
    .btn-hapus  { background-color: #c9b99a; color: #3d2e1e; border: none; font-size: 12px; }
    .btn-hapus:hover { background-color: #a89278; }
    .judul-nav  { color: #3d2e1e; font-weight: bold; letter-spacing: 1px; font-size: 14px; }
    th          { background-color: #ede5d8; color: #4e3f2e; font-weight: 600; font-size: 13px; }
    td          { font-size: 13px; vertical-align: middle; }
    footer      { color: #a89278; font-size: 12px; }
    label       { font-size: 13px; color: #5c4a32; }
  </style>
</head>
<body>

<!-- Navbar -->
<nav class="navbar px-4 py-2">
  <span class="judul-nav">SISTEM INVENTARIS BARANG KANTOR</span>
  <img src="logo.png" width="50" onerror="this.style.display='none'">
</nav>

<div class="container my-4">
  <div class="row g-4">

    <!-- Form tambah barang -->
    <div class="col-md-4">
      <div class="card p-4">
        <p class="fw-bold mb-3" style="color:#4e3f2e; font-size:13px;">TAMBAH BARANG</p>

        <label for="nama">Nama Barang</label>
        <input id="nama" class="form-control form-control-sm mb-2" placeholder="contoh: Laptop">

        <label for="jumlah">Jumlah</label>
        <input id="jumlah" type="number" class="form-control form-control-sm mb-2" placeholder="contoh: 10">

        <label for="kategori">Kategori</label>
        <select id="kategori" class="form-select form-select-sm mb-3">
          <option value="">Pilih Kategori</option>
          <option>Elektronik</option>
          <option>Alat Tulis Kantor</option>
          <option>Mebel</option>
        </select>

        <!-- Tombol menyimpan barang -->
        <button onclick="tambahBarang()" class="btn btn-simpan btn-sm w-100">Simpan Barang +</button>
      </div>
    </div>

    <!-- Tabel daftar barang -->
    <div class="col-md-8">
      <div class="card p-4">
        <p class="fw-bold mb-3" style="color:#4e3f2e; font-size:13px;">DAFTAR BARANG INVENTARIS</p>

        <table class="table table-bordered table-sm">
          <thead>
            <tr>
              <th>ID</th><th>Nama Barang</th><th>Jumlah</th><th>Kategori</th><th>Aksi</th>
            </tr>
          </thead>
          <tbody id="tabelBody"></tbody>
        </table>
      </div>
    </div>

  </div>
</div>

<footer class="text-center my-3">Powered by Bootstrap 5 - BNSP Junior Web Programmer</footer>

<script>
  // Struktur data array of objects untuk menyimpan data inventaris sementara
  let dataBarang = [];
  let idCounter  = 1;

  // Menambah barang baru, dengan validasi input kosong dan cek duplikat
  function tambahBarang() {
    let nama     = document.getElementById("nama").value.trim();
    let jumlah   = parseInt(document.getElementById("jumlah").value);
    let kategori = document.getElementById("kategori").value;

    // Semua field wajib diisi sebelum disimpan
    if (!nama || !jumlah || !kategori) {
      alert("Semua field harus diisi!");
      return;
    }

    // Cek apakah barang dengan nama & kategori sama sudah ada, jika ya tambah jumlahnya
    let ada = dataBarang.find(b => b.nama.toLowerCase() === nama.toLowerCase() && b.kategori === kategori);
    if (ada) {
      ada.jumlah += jumlah;
    } else {
      // Jika belum ada, buat objek baru dan masukkan ke array
      dataBarang.push({ id: idCounter++, nama, jumlah, kategori });
    }

    // Debugging: tampilkan isi array di console browser
    console.log("Data barang saat ini:", dataBarang);

    tampilkanData();
    resetForm();
  }

  // Menampilkan seluruh isi array ke dalam tabel HTML
  function tampilkanData() {
    let tbody = document.getElementById("tabelBody");
    tbody.innerHTML = "";

    dataBarang.forEach((b, i) => {
      tbody.innerHTML += `
        <tr>
          <td>${i + 1}</td>
          <td>${b.nama}</td>
          <td>${b.jumlah}</td>
          <td>${b.kategori}</td>
          <td><button onclick="hapusBarang(${b.id})" class="btn btn-hapus btn-sm">Hapus</button></td>
        </tr>`;
    });
  }

  // Menghapus barang dari array berdasarkan ID uniknya
  function hapusBarang(id) {
    dataBarang = dataBarang.filter(b => b.id !== id);
    tampilkanData();
  }

  // Mengosongkan semua field form setelah data berhasil disimpan
  function resetForm() {
    document.getElementById("nama").value     = "";
    document.getElementById("jumlah").value   = "";
    document.getElementById("kategori").value = "";
  }
</script>

</body>
</html>
